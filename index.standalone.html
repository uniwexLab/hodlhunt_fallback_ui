<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CryptoFish</title>
  <style>:root {
  --bg: #0f1419;
  --surface: #1a2332;
  --border: #2d3a4d;
  --text: #e6edf3;
  --muted: #8b9cb3;
  --accent: #58a6ff;
  --success: #3fb950;
  --error: #f85149;
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 1rem;
  line-height: 1.5;
}

.header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}

.header h1 {
  margin: 0 0 0.5rem 0;
  font-size: 1.25rem;
}

.header .hint {
  margin: 0 0 1rem 0;
  font-size: 0.85rem;
  color: var(--muted);
}

.header .hint code {
  background: var(--bg);
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
}

.header-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}

.rpc-block {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.rpc-block label {
  font-size: 0.75rem;
  color: var(--muted);
}

.rpc-block select,
.rpc-block input[type="text"] {
  min-width: 180px;
  padding: 0.4rem 0.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
}

.rpc-custom input {
  min-width: 260px;
}

.wallet-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.import-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem;
}

.import-row .import-label {
  font-size: 0.85rem;
  color: var(--muted);
}

.import-row #secretKeyInput {
  min-width: 200px;
  flex: 1;
  max-width: 360px;
  padding: 0.4rem 0.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.85rem;
}

#walletStatus {
  font-size: 0.9rem;
  color: var(--muted);
}

button {
  padding: 0.5rem 0.75rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
}

button:hover {
  opacity: 0.9;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.hidden {
  display: none !important;
}

.main {
  max-width: 720px;
  margin: 0 auto;
}

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

.section h2 {
  margin: 0 0 0.75rem 0;
  font-size: 1.1rem;
  color: var(--muted);
}

.section h3 {
  margin: 0.5rem 0 0.25rem 0;
  font-size: 0.95rem;
}

#oceanInfo {
  font-size: 0.9rem;
}

#oceanInfo.loading {
  color: var(--muted);
}

.fish-card {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}

.fish-card:last-child {
  border-bottom: none;
}

.fish-card .fish-id {
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.fish-card .fish-name {
  font-weight: 500;
}

.fish-card .fish-share {
  color: var(--accent);
}

.fish-card button {
  padding: 0.3rem 0.5rem;
  font-size: 0.8rem;
}

.actions-section input[type="text"],
.actions-section input[type="number"] {
  padding: 0.4rem 0.5rem;
  margin-right: 0.5rem;
  margin-bottom: 0.25rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  min-width: 120px;
}

.action-create,
.action-feed,
.action-exit,
.action-hunt,
.action-mark,
.action-transfer {
  margin-bottom: 1rem;
}

.action-exit .hint {
  font-size: 0.85rem;
  color: var(--muted);
  margin: 0.25rem 0 0 0;
}

#txStatus {
  min-height: 1.5rem;
  font-size: 0.9rem;
}

#txStatus.success {
  color: var(--success);
}

#txStatus.error {
  color: var(--error);
}

#txExplorerLink {
  color: var(--accent);
  margin-top: 0.5rem;
  display: inline-block;
}

#txExplorerLink.hidden {
  display: none;
}

/* ========== Новый интерфейс: авторизация ========== */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.auth-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  max-width: 400px;
  width: 100%;
}
.auth-box h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }
.auth-hint { font-size: 0.9rem; color: var(--muted); margin: 0 0 1rem 0; }
.auth-input {
  width: 100%;
  padding: 0.6rem 0.75rem;
  margin-bottom: 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.9rem;
}
.auth-btn { width: 100%; padding: 0.6rem; font-size: 1rem; }
.auth-error { color: var(--error); font-size: 0.9rem; margin-top: 0.5rem; }

/* ========== Основное приложение ========== */
.app-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.top-menu {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.menu-left { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.menu-wallet { font-variant-numeric: tabular-nums; font-size: 0.9rem; }
.lang-switcher { display: flex; gap: 0.15rem; }
.lang-btn { padding: 0.25rem 0.5rem; font-size: 0.8rem; background: var(--bg); color: var(--muted); }
.lang-btn.active { background: var(--accent); color: #fff; }
.lang-btn:hover:not(.active) { color: var(--text); }
.menu-balance { font-weight: 600; color: var(--accent); }
.menu-right { display: flex; align-items: center; gap: 0.5rem; }
.menu-rpc-label { font-size: 0.75rem; color: var(--muted); }
.menu-rpc-select {
  padding: 0.35rem 0.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.85rem;
}
.menu-logout { padding: 0.35rem 0.6rem; font-size: 0.85rem; }

.two-columns {
  display: flex;
  flex: 1;
  min-height: 0;
}
.left-col {
  width: 280px;
  min-width: 280px;
  padding: 1rem;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}
.left-col h2 { margin: 0 0 0.5rem 0; font-size: 0.95rem; color: var(--muted); }
.ocean-summary { margin-bottom: 1rem; }
.ocean-summary #oceanContent { font-size: 0.9rem; line-height: 1.5; }
.my-fish-section h2 { margin-bottom: 0.5rem; }
.my-fish-list { display: flex; flex-direction: column; gap: 0.25rem; }
.my-fish-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.35rem;
  padding: 0.5rem 0.6rem;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.my-fish-item .fish-id { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 0.25rem; }
.my-fish-item .fish-name { font-weight: 500; }
.my-fish-item .fish-sol { color: var(--accent); font-variant-numeric: tabular-nums; }
.my-fish-item .fish-actions { display: flex; gap: 0.25rem; }
.my-fish-item .fish-actions button { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
.btn-create-fish { margin-top: 0.5rem; width: 100%; font-size: 0.85rem; }

.right-col {
  flex: 1;
  padding: 1rem;
  overflow-y: auto;
}
.content-section { margin-bottom: 1rem; }
.content-section h2 { margin: 0 0 0.75rem 0; font-size: 1.1rem; }
.content-section.muted, .muted { color: var(--muted); font-size: 0.9rem; }
.hunt-hunter-info { margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--muted); }
.prey-list { display: flex; flex-direction: column; gap: 0.5rem; }
.prey-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.prey-row .prey-name { font-weight: 500; }
.prey-row .prey-sol { color: var(--accent); }
.prey-row .prey-meta { font-size: 0.85rem; color: var(--muted); }
.prey-row .prey-actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.prey-load-more { margin-top: 0.75rem; text-align: center; }
.prey-load-more button { padding: 0.5rem 1rem; }
.prey-load-more.muted { font-size: 0.9rem; color: var(--muted); }
.fish-card-content { max-width: 520px; }
.fish-card-detail { margin-bottom: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
.fish-card-detail .row,
.fish-card-detail .form-row { margin-bottom: 0.5rem; }
.fish-card-actions { display: flex; flex-direction: column; gap: 0.5rem; }
.form-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.form-row label {
  min-width: 10rem;
  font-size: 0.9rem;
  color: var(--muted);
}
.form-input {
  padding: 0.4rem 0.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  min-width: 140px;
  max-width: 200px;
}
.fish-card-actions .form-row label { min-width: 8rem; }
.fish-card-actions input.form-input { min-width: 120px; }
.fish-create-form .form-row { margin-bottom: 0.6rem; }
.fish-create-form .form-input { min-width: 160px; }
.fish-card-actions .form-row,
.fish-card-hunt-block .form-row { margin-bottom: 0.4rem; }
.fish-card-hunt-block { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.fish-card-hunt-block h3 { margin: 0 0 0.5rem 0; font-size: 0.95rem; color: var(--muted); }
.auto-hunt-hint { font-size: 0.85rem; margin: 0.5rem 0 0.75rem 0; max-width: 420px; line-height: 1.4; }
.card-prey-list { margin-top: 0.5rem; margin-bottom: 0.75rem; }
.card-prey-list .prey-row { margin-bottom: 0.5rem; }

.app-footer {
  padding: 0.5rem 1rem;
  font-size: 0.85rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.tx-status { margin-right: 0.75rem; }
.tx-explorer-link { color: var(--accent); }
.tx-status.success { color: var(--success); }
.tx-status.error { color: var(--error); }
.tx-explorer-link.hidden { display: none; }
.loading { color: var(--muted); }
.success { color: var(--success); }
.error { color: var(--error); }

/* ========== Модалка транзакции / ошибки ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.hidden { display: none; }
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  cursor: pointer;
}
.modal-box {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.modal-title { margin: 0; font-size: 1.1rem; }
.modal-title.modal-title--success { color: var(--success); }
.modal-title.modal-title--error { color: var(--error); }
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
  padding: 0 0.25rem;
}
.modal-close:hover { color: var(--text); }
.modal-body {
  padding: 1.25rem;
  font-size: 0.95rem;
  line-height: 1.5;
  word-break: break-all;
}
.modal-body code.modal-sig { font-size: 0.8rem; display: block; margin-top: 0.5rem; }
.modal-footer {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
}
.modal-link { color: var(--accent); text-decoration: none; }
.modal-link:hover { text-decoration: underline; }
.modal-link.hidden { display: none; }
.modal-btn-close { padding: 0.5rem 1rem; }

/* ========== Адаптив: планшеты и телефоны ========== */
@media (max-width: 768px) {
  body {
    padding: 0.5rem;
  }

  .two-columns {
    flex-direction: column;
  }

  .left-col {
    width: 100%;
    min-width: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }

  .right-col {
    padding: 0.75rem 1rem;
    min-height: 50vh;
  }

  .top-menu {
    padding: 0.5rem 0.75rem;
    gap: 0.5rem;
  }

  .menu-left,
  .menu-right {
    gap: 0.5rem;
  }

  .menu-wallet {
    font-size: 0.8rem;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .menu-rpc-select {
    min-width: 0;
    max-width: 140px;
  }

  .form-row {
    flex-direction: column;
    align-items: stretch;
    gap: 0.25rem;
  }

  .form-row label {
    min-width: 0;
  }

  .form-input {
    max-width: none;
    min-width: 0;
    width: 100%;
    padding: 0.5rem 0.6rem;
    font-size: 16px; /* отключает зум при фокусе на iOS */
  }

  .fish-card-actions .form-row label,
  .fish-card-hunt-block .form-row label {
    min-width: 0;
  }

  .fish-card-content {
    max-width: none;
  }

  .fish-card-hunt-block .form-row {
    flex-direction: column;
    align-items: stretch;
  }

  .fish-card-hunt-block .form-row .form-input,
  .fish-card-hunt-block .form-row button {
    width: 100%;
    max-width: none;
  }

  .fish-card-hunt-block .form-row {
    gap: 0.5rem;
  }

  .my-fish-item {
    padding: 0.6rem 0.75rem;
  }

  .my-fish-item .fish-actions button {
    min-height: 44px;
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
  }

  button {
    min-height: 44px;
    padding: 0.5rem 0.75rem;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-create-fish {
    min-height: 48px;
  }

  .prey-row {
    flex-direction: column;
    align-items: stretch;
    gap: 0.5rem;
    padding: 0.6rem;
  }

  .prey-row .prey-actions {
    flex-wrap: wrap;
  }

  .prey-row .prey-actions button {
    min-height: 44px;
    flex: 1;
    min-width: 120px;
  }

  .app-footer {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
  }

  .tx-status {
    flex: 1 1 100%;
    word-break: break-word;
  }

  .modal-overlay {
    padding: 0.5rem;
    align-items: flex-end;
  }

  .modal-box {
    max-width: none;
    max-height: 90vh;
    overflow-y: auto;
  }

  .auth-box {
    padding: 1.25rem 1.5rem;
    margin: 0.5rem;
  }

  .auth-input {
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  body {
    padding: 0.25rem;
  }

  .top-menu {
    flex-direction: column;
    align-items: stretch;
  }

  .menu-left,
  .menu-right {
    justify-content: space-between;
  }

  .menu-wallet {
    max-width: none;
  }

  .content-section h2 {
    font-size: 1rem;
  }

  .fish-card-detail {
    padding: 0.75rem;
  }

  .left-col h2,
  .my-fish-section h2 {
    font-size: 0.9rem;
  }
}
</style>
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-box">
      <h1 data-i18n="authTitle">CryptoFish</h1>
      <p class="auth-hint" data-i18n="authHint">Введите приватный ключ (base58 или JSON-массив)</p>
      <input type="password" id="secretKeyInput" class="auth-input" data-i18n-placeholder="authPlaceholder" placeholder="Приватный ключ" autocomplete="off">
      <button type="button" id="btnLogin" class="auth-btn" data-i18n="login">Войти</button>
      <p id="authError" class="auth-error hidden"></p>
    </div>
  </div>

  <div id="appScreen" class="app-screen hidden">
    <header class="top-menu">
      <div class="menu-left">
        <span class="menu-wallet" id="menuWallet">—</span>
        <span class="menu-balance" id="menuBalance">— SOL</span>
        <span class="lang-switcher">
          <button type="button" id="btnLangRu" class="lang-btn active" data-lang="ru">RU</button>
          <button type="button" id="btnLangEn" class="lang-btn" data-lang="en">EN</button>
        </span>
      </div>
      <div class="menu-right">
        <label class="menu-rpc-label" for="rpcPreset">RPC</label>
        <select id="rpcPreset" class="menu-rpc-select">
          <option value="https://solana-rpc.publicnode.com" selected>PublicNode</option>
          <option value="https://api.mainnet-beta.solana.com">Solana (офиц.)</option>
        </select>
        <button type="button" id="btnLogout" class="menu-logout" data-i18n="logout">Выйти</button>
      </div>
    </header>

    <div class="two-columns">
      <aside class="left-col">
        <section class="ocean-summary" id="oceanSummary">
          <h2 data-i18n="ocean">Океан</h2>
          <div id="oceanContent" data-i18n="loading">Загрузка…</div>
        </section>
        <section class="my-fish-section">
          <h2 data-i18n="myFish">Мои рыбы</h2>
          <div id="myFishList" class="my-fish-list" data-i18n="loginByKey">Войдите по ключу.</div>
          <button type="button" id="btnCreateFishTop" class="btn-create-fish" data-i18n="createFishBtn">Создать рыбу</button>
        </section>
      </aside>

      <main class="right-col">
        <div id="sectionFishCard" class="content-section hidden">
          <h2 data-i18n="fishCard">Карточка рыбы</h2>
          <div id="fishCardContent" class="fish-card-content"></div>
        </div>
        <div id="sectionCreateFish" class="content-section hidden">
          <h2 data-i18n="createFish">Создать рыбу</h2>
          <div class="fish-create-form">
            <div class="form-row"><label for="newFishName" data-i18n="name">Имя</label><input type="text" id="newFishName" data-i18n-placeholder="fishNamePlaceholder" placeholder="Имя рыбы" class="form-input"></div>
            <div class="form-row"><label for="newFishDeposit" data-i18n="depositSol">Депозит (SOL)</label><input type="text" id="newFishDeposit" placeholder="0.1" class="form-input"></div>
            <button type="button" id="btnCreateFish" data-i18n="create">Создать</button>
          </div>
        </div>
        <div id="sectionPlaceholder" class="content-section">
          <p class="muted" data-i18n="placeholderHint">Выберите «Перейти к рыбе» в списке слева.</p>
        </div>
      </main>
    </div>

    <footer class="app-footer">
      <span id="txStatus" class="tx-status"></span>
      <a id="txExplorerLink" class="tx-explorer-link hidden" target="_blank" rel="noopener" data-i18n="explorer">Эксплорер</a>
    </footer>
  </div>

  <div id="txModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-backdrop" id="txModalBackdrop"></div>
    <div class="modal-box" role="dialog" aria-labelledby="txModalTitle">
      <div class="modal-header">
        <h2 id="txModalTitle" class="modal-title"></h2>
        <button type="button" class="modal-close" id="txModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="txModalBody"></div>
